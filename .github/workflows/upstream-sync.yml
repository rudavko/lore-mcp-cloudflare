# Managed by lore-mcp auto-updates
name: Upstream Sync

on:
  schedule:
    - cron: "46 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: oven-sh/setup-bun@v2

      - name: Resolve latest upstream lore-mcp tag
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git ls-remote --tags --refs https://github.com/rudavko/lore-mcp.git 'v*' | awk -F/ '{print $3}' | sort -V | tail -n1)"
          if [ -z "${latest_tag}" ]; then
            echo "Failed to resolve upstream lore-mcp tag"
            exit 1
          fi
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Repin lore-mcp dependency
        id: repin
        if: steps.upstream.outputs.latest_tag != ''
        shell: bash
        run: |
          set -euo pipefail
          node ./scripts/repinLoreMcp.js --tag "${LATEST_TAG}"
          if git diff --quiet -- package.json bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
        env:
          LATEST_TAG: ${{ steps.upstream.outputs.latest_tag }}

      - name: Create pull request for dependency bump
        if: steps.repin.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump lore-mcp dependency to ${{ steps.upstream.outputs.latest_tag }}"
          branch: lore-mcp-auto-update/${{ steps.upstream.outputs.latest_tag }}
          delete-branch: true
          title: "chore: bump lore-mcp dependency to ${{ steps.upstream.outputs.latest_tag }}"
          body: |
            Automated lore-mcp dependency repin to `${{ steps.upstream.outputs.latest_tag }}`.
          labels: dependencies
